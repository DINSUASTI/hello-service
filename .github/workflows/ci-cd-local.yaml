name: CI-CD Local (K8s Desktop)

on:
  push:
    branches: ["main"]

jobs:
  ci:
    name: Build & Test (CI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build & Test
        run: |
          chmod +x mvnw
          ./mvnw -q clean test

  cd_local:
    name: Build Image & Deploy (CD Localhost)
    needs: ci
    runs-on: [self-hosted, local-k8s]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: K8s preflight
        run: |
          export KUBECONFIG=$HOME/.kube/config
          echo "KUBECONFIG=$KUBECONFIG"
          kubectl config get-contexts
          kubectl config current-context
          kubectl cluster-info
          kubectl get nodes

      - name: Show tool versions
        run: |
          echo "Docker:"
          docker version
          echo "Kubectl:"
          kubectl version --client
          echo "Context:"
          kubectl config current-context
          kubectl get nodes

      - name: Build JAR
        run: |
          chmod +x mvnw
          ./mvnw -q clean package

      - name: Build Docker image
        run: |
          TAG="${{ github.run_number }}"
          docker build -t hello-service:$TAG .
          docker images hello-service

      - name: Deploy to Kubernetes
        run: |
          TAG="${{ github.run_number }}"
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl -n hello set image deployment/hello-service hello-service=hello-service:$TAG
          kubectl -n hello rollout status deployment/hello-service

      - name: Smoke test
        run: |
          kubectl -n hello port-forward svc/hello-service 8080:80 > /tmp/pf.log 2>&1 &
          PF_PID=$!
          sleep 5
          curl -f http://localhost:8080/actuator/health
          kill $PF_PID